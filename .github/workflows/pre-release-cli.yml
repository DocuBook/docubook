name: Create Pre-Release for @docubook/cli

permissions:
  contents: write

on:
  push:
    tags:
      - "cli-v*.*.*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const previousTag = releases.length > 0 ? releases[0].tag_name : null;
            
            let commits = [];
            if (previousTag) {
              const { data: comparison } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: previousTag,
                head: tag,
              });
              commits = comparison.commits;
            } else {
              const { data: tagData } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              const { data: allCommits } = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              commits = allCommits.slice(0, 100);
            }
            
            // Filter commits to only include changes from packages/cli directory
            const cliCommits = commits.filter(commit => {
              return commit.files && commit.files.some(file => file.filename.startsWith('packages/cli/'));
            });
            
            const categories = {
              '🎉 Features': [],
              '🐛 Bug Fixes': [],
              '📚 Documentation': [],
              '🔧 Core': [],
              '⚙️ Maintenance': [],
              '🚀 Performance': [],
              '🎨 Styling': [],
            };
            
            cliCommits.forEach(commit => {
              const message = commit.commit.message;
              const match = message.match(/^(feat|fix|docs|core|chore|perf|style|refactor)\s*(?:\(.+\))?:\s*(.+)/i);
              
              if (match) {
                const [, type, description] = match;
                const shortSha = commit.sha.substring(0, 7);
                const entry = `- ${description} ([${shortSha}](${commit.html_url}))`;
                
                switch (type.toLowerCase()) {
                  case 'feat':
                    categories['🎉 Features'].push(entry);
                    break;
                  case 'fix':
                    categories['🐛 Bug Fixes'].push(entry);
                    break;
                  case 'docs':
                    categories['📚 Documentation'].push(entry);
                    break;
                  case 'core':
                    categories['🔧 Core'].push(entry);
                    break;
                  case 'perf':
                    categories['🚀 Performance'].push(entry);
                    break;
                  case 'style':
                    categories['🎨 Styling'].push(entry);
                    break;
                  case 'chore':
                  case 'refactor':
                    categories['⚙️ Maintenance'].push(entry);
                    break;
                }
              }
            });
            
            let changelog = `## ${tag}\n\n`;
            Object.entries(categories).forEach(([category, items]) => {
              if (items.length > 0) {
                changelog += `### ${category}\n${items.join('\n')}\n\n`;
              }
            });
            
            core.setOutput('changelog', changelog);

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/cli/package.json
            packages/cli/README.md
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
