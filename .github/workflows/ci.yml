name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, build, test]
    steps:
      - uses: actions/checkout@v7

      - uses: step-security/setup-bun@v1
        if: matrix.task == 'build' || matrix.task == 'test'

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ${{ matrix.task }}
        run: pnpm turbo ${{ matrix.task }}

  runtime-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, deno]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: denoland/setup-deno@v2
        if: matrix.runtime == 'deno'
        with:
          deno-version: v2.x

      - run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm turbo build --filter=@docubook/flame^...

      # No explicit `compile-lib` step: the CLI compiles .docu/lib lazily
      # when it is missing, and these jobs exercise that path.
      - name: Node runtime smoke (flame build)
        if: matrix.runtime == 'node'
        run: NODE_ENV=production FLAME_RUNTIME=node node bin/cli.js build
        working-directory: packages/flame

      - name: Deno runtime smoke (flame build)
        if: matrix.runtime == 'deno'
        run: NODE_ENV=production deno run -A bin/cli.js build
        working-directory: packages/flame
