name: Publish @docubook/cli to npm

on:
  push:
    tags:
      - "cli-v*.*.*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build (pnpm)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
          scope: "@docubook"
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish @docubook/cli to npm
        run: pnpm publish packages/cli --access public --no-git-checks --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/cli/package.json
            packages/cli/README.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
